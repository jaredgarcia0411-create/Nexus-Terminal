version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  backtest-gateway:
    build: ./backtest-gateway
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  backtest-worker:
    build: ./backtest-worker
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  discord-bot:
    build: ./discord-bot
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - NEXUS_API_URL=http://host.docker.internal:3000
      - TRADE_WEBHOOK_SECRET=${TRADE_WEBHOOK_SECRET}

volumes:
  redis-data:
